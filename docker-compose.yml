version: '3.8'

services:
  cerebro:
    build: .
    container_name: cerebro-bot
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      # Persist SQLite database and WhatsApp session across restarts
      - cerebro_data:/data

volumes:
  cerebro_data:
